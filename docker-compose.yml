services:
  backend:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      OTN_ADMIN_TOKEN: ${OTN_ADMIN_TOKEN:-change-this-admin-token}
      OTN_SECRET_KEY: ${OTN_SECRET_KEY:-change-this-long-random-secret-key}
      OTN_DATABASE_PATH: ${OTN_DATABASE_PATH:-/data/own-newsletter.sqlite}
      OTN_FEEDS_DIR: ${OTN_FEEDS_DIR:-/data/feeds}
      OTN_PUBLIC_ORIGIN: ${OTN_PUBLIC_ORIGIN:-http://localhost:8080}
      OTN_COOKIE_SECURE: ${OTN_COOKIE_SECURE:-false}
      OTN_SESSION_DAYS: ${OTN_SESSION_DAYS:-30}
      OTN_SCHEDULER_ENABLED: ${OTN_SCHEDULER_ENABLED:-true}
      OTN_SCHEDULER_TICK_SECONDS: ${OTN_SCHEDULER_TICK_SECONDS:-60}
      OTN_IMAP_TIMEOUT_SECONDS: ${OTN_IMAP_TIMEOUT_SECONDS:-30}
    volumes:
      - ./data:/data
    ports:
      - "${OTN_BACKEND_PORT:-8000}:8000"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    expose:
      - "80"

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "${OTN_FRONTEND_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
